version: "3.9"

services:
  backend:
    build: ./docker
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - mongo
    env_file:
      - .env

  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: inventory_db
    volumes:
      - pgdata:/var/lib/postgresql/data

  mongo:
    image: mongo:6
    volumes:
      - mongodata:/data/db

volumes:
  pgdata:
  mongodata: